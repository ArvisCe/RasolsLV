<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uzturs</title>
    <link rel="icon" type="image/x-icon" href="../images/icon2.ico">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-dark: #0f0f0f;
            --bg-darker: #0a0a0a;
            --bg-card: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent-primary: #ff6b35;
            --accent-weight: #4ecdc4;
            --border-color: #2a2a2a;
            --hover-state: #252525;
            --protein-color: #ff9f43;
            --fiber-color: #6bffb8;
            --carbs-color: #a29bfe;
            --fat-color: #fd79a8;
            --kcal-color: #fdcb6e;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Space Mono', monospace;
        }

        body { display: flex; flex-direction: column; }

        .header {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .header-left { flex: 1; }

        .header-title {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-weight);
            margin: 0;
        }

        .header-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .nav-link {
            flex-shrink: 0;
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--accent-primary);
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .nav-link:hover {
            background-color: var(--accent-primary);
            color: var(--bg-dark);
            border-color: var(--accent-primary);
        }

        .nav-link.back {
            color: var(--accent-weight);
            border-color: var(--accent-weight);
        }

        .nav-link.back:hover {
            background-color: var(--accent-weight);
            color: var(--bg-dark);
            border-color: var(--accent-weight);
        }

        .diet-list {
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding: 24px;
        }

        .diet-entry {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            overflow: hidden;
        }

        .diet-entry-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .diet-entry-date {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .diet-entry-description {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-top: 4px;
        }

        .diet-entry-totals {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .macro-badge {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 4px;
            font-family: 'Space Mono', monospace;
            white-space: nowrap;
        }

        .macro-badge.protein { color: var(--protein-color); background: rgba(255,159,67,0.1); }
        .macro-badge.fiber   { color: var(--fiber-color);   background: rgba(107,255,184,0.1); }
        .macro-badge.carbs   { color: var(--carbs-color);   background: rgba(162,155,254,0.1); }
        .macro-badge.fat     { color: var(--fat-color);     background: rgba(253,121,168,0.1); }
        .macro-badge.kcal    { color: var(--kcal-color);    background: rgba(253,203,110,0.1); }

        .diet-entry-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }

        .diet-entry-foods {
            padding: 16px 20px;
            border-right: 1px solid var(--border-color);
        }

        .foods-title {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .food-item {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
            gap: 12px;
        }

        .food-item:last-child { border-bottom: none; }

        .food-name {
            font-size: 13px;
            color: var(--text-primary);
            flex: 1;
        }

        .food-macros {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .food-macro {
            font-size: 10px;
            font-family: 'Space Mono', monospace;
            padding: 1px 6px;
            border-radius: 3px;
            white-space: nowrap;
        }

        .food-macro.protein { color: var(--protein-color); background: rgba(255,159,67,0.1); }
        .food-macro.fiber   { color: var(--fiber-color);   background: rgba(107,255,184,0.1); }
        .food-macro.carbs   { color: var(--carbs-color);   background: rgba(162,155,254,0.1); }
        .food-macro.fat     { color: var(--fat-color);     background: rgba(253,121,168,0.1); }
        .food-macro.kcal    { color: var(--kcal-color);    background: rgba(253,203,110,0.1); }

        .diet-entry-images {
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .images-title {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .food-images-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .food-image-wrap {
            flex: 1;
            min-width: 80px;
            max-width: 160px;
            aspect-ratio: 1 / 1;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            background: var(--bg-darker);
        }

        .food-image-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.2s;
        }

        .food-image-wrap img.broken {
            opacity: 0;
        }

        .food-image-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        @media (max-width: 640px) {
            .diet-entry-body {
                grid-template-columns: 1fr;
            }
            .diet-entry-foods {
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }
            .header { padding: 12px 16px; }
            .header-title { font-size: 20px; }
            .diet-list { padding: 16px; gap: 16px; }
        }

        @media (max-width: 480px) {
            .header-title { font-size: 18px; }
            .nav-link { font-size: 11px; padding: 6px 12px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1 class="header-title">Uzturs</h1>
            <p class="header-subtitle">Ēdienreižu uzskaite un makroelementi</p>
        </div>
        <a href="weight.html" class="nav-link back">Svars</a>
    </div>

    <div class="diet-list" id="diet-list"></div>

    <script>
        const dietData = [
            {
                date: "2026-06-04",
                description: "OMAD diena",
                foods: [
                    { name: "Vistas krūtiņa",   weight: 400, kcal: 660,  protein: 124, fiber: 0, fat: 14, carbohydrates: 0 },
                    { name: "Sarkanās pupiņas",   weight: 250, kcal: 225,  protein: 17.5, fiber: 16, fat: 1.3, carbohydrates: 37.5 },
                    { name: "Jalapeno",   weight: 50, kcal: 15,  protein: 0.5, fiber: 1.4, fat: 0.2, carbohydrates: 3 },
                    { name: "BBQ sauce",   weight: 30, kcal: 60,  protein: 0, fiber: 0, fat: 0.2, carbohydrates: 15 },
                    { name: "Olīveļla",   weight: 10, kcal: 82,  protein: 0, fiber: 0, fat: 9, carbohydrates: 0 },
                    { name: "Tomāti",   weight: 240, kcal: 43,  protein: 2, fiber: 2.9, fat: 0.5, carbohydrates: 9 },
                ],
                images: [1, 2]
            },
        ];

        function sumMacro(foods, key) {
            return foods.reduce((acc, f) => acc + (f[key] || 0), 0);
        }

        function formatDate(dateStr) {
            return new Date(dateStr).toLocaleDateString('lv-LV', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function macroSpans(food) {
            const parts = [];
            if (food.protein !== undefined) parts.push(`<span class="food-macro protein">P ${food.protein}g</span>`);
            if (food.carbs   !== undefined) parts.push(`<span class="food-macro carbs">O ${food.carbs}g</span>`);
            if (food.fat     !== undefined) parts.push(`<span class="food-macro fat">T ${food.fat}g</span>`);
            if (food.fiber   !== undefined) parts.push(`<span class="food-macro fiber">Š ${food.fiber}g</span>`);
            if (food.kcal    !== undefined) parts.push(`<span class="food-macro kcal">${food.kcal} kcal</span>`);
            return parts.join('');
        }

        const container = document.getElementById('diet-list');

        const grouped = [];
        const seen = {};
        dietData.forEach(entry => {
            const key = entry.date + '|' + entry.description;
            if (!seen[key]) { seen[key] = true; grouped.push(entry); }
        });

        grouped.sort((a, b) => new Date(b.date) - new Date(a.date));

        grouped.forEach(entry => {
            const totalProtein = sumMacro(entry.foods, 'protein');
            const totalFiber   = sumMacro(entry.foods, 'fiber');
            const totalCarbs   = sumMacro(entry.foods, 'carbs');
            const totalFat     = sumMacro(entry.foods, 'fat');
            const totalKcal    = sumMacro(entry.foods, 'kcal');

            const foodRows = entry.foods.map(f => `
                <div class="food-item">
                    <span class="food-name">${f.name}</span>
                    <div class="food-macros">${macroSpans(f)}</div>
                </div>
            `).join('');

            const imageItems = (entry.images || []).map(n => {
                const src = `food/${entry.date}/${n}.png`;
                return `
                    <div class="food-image-wrap">
                        <img src="${src}" alt="Ēdiena foto ${n}" onerror="this.classList.add('broken')">
                    </div>
                `;
            }).join('');

            const imagesSection = (entry.images && entry.images.length > 0) ? `
                <div class="diet-entry-images">
                    <div class="images-title">Foto</div>
                    <div class="food-images-grid">${imageItems}</div>
                </div>
            ` : `
                <div class="diet-entry-images">
                    <div class="images-title">Foto</div>
                    <div class="food-image-placeholder">Nav pievienots foto</div>
                </div>
            `;

            container.innerHTML += `
                <div class="diet-entry">
                    <div class="diet-entry-header">
                        <div>
                            <div class="diet-entry-date">${formatDate(entry.date)}</div>
                            <div class="diet-entry-description">${entry.description}</div>
                        </div>
                        <div class="diet-entry-totals">
                            <span class="macro-badge protein">P ${totalProtein}g</span>
                            <span class="macro-badge carbs">O ${totalCarbs}g</span>
                            <span class="macro-badge fat">T ${totalFat}g</span>
                            <span class="macro-badge fiber">Š ${totalFiber}g</span>
                            <span class="macro-badge kcal">${totalKcal} kcal</span>
                        </div>
                    </div>
                    <div class="diet-entry-body">
                        <div class="diet-entry-foods">
                            <div class="foods-title">Produkti</div>
                            ${foodRows}
                        </div>
                        ${imagesSection}
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
